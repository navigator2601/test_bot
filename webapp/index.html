<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Веб-додаток для фільтрації кондиціонерів</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
        }
        .filters {
            margin-bottom: 20px;
        }
        .filters select {
            margin-right: 10px;
            padding: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        table, th, td {
            border: 1px solid #ddd;
        }
        th, td {
            padding: 10px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Фільтруйте кондиціонери</h1>
        <div class="filters">
            <select id="brandFilter">
                <option value="">Виберіть бренд</option>
            </select>
            <select id="typeFilter">
                <option value="">Виберіть тип</option>
            </select>
            <select id="powerFilter">
                <option value="">Виберіть потужність</option>
            </select>
            <button onclick="applyFilters()">Застосувати фільтри</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Модель</th>
                    <th>Бренд</th>
                    <th>Тип</th>
                    <th>Потужність</th>
                </tr>
            </thead>
            <tbody id="results">
                <tr>
                    <td colspan="4" style="text-align: center;">Немає результатів</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        // Приклад даних (для тестування)
        const data = [
            { model: "AC123", brand: "Samsung", type: "Спліт-система", power: "2.5 кВт" },
            { model: "AC124", brand: "LG", type: "Мобільний", power: "1.5 кВт" },
            { model: "AC125", brand: "Daikin", type: "Спліт-система", power: "3.5 кВт" }
        ];

        // Заповнення випадаючих списків
        function populateFilters() {
            const brands = [...new Set(data.map(item => item.brand))];
            const types = [...new Set(data.map(item => item.type))];
            const powers = [...new Set(data.map(item => item.power))];

            fillSelect("brandFilter", brands);
            fillSelect("typeFilter", types);
            fillSelect("powerFilter", powers);
        }

        function fillSelect(id, options) {
            const select = document.getElementById(id);
            options.forEach(option => {
                const opt = document.createElement("option");
                opt.value = option;
                opt.textContent = option;
                select.appendChild(opt);
            });
        }

        // Застосування фільтрів
        function applyFilters() {
            const brand = document.getElementById("brandFilter").value;
            const type = document.getElementById("typeFilter").value;
            const power = document.getElementById("powerFilter").value;

            const filteredData = data.filter(item => 
                (brand === "" || item.brand === brand) &&
                (type === "" || item.type === type) &&
                (power === "" || item.power === power)
            );

            renderResults(filteredData);
        }

        // Відображення результатів
        function renderResults(results) {
            const resultsTable = document.getElementById("results");
            resultsTable.innerHTML = "";

            if (results.length === 0) {
                const row = document.createElement("tr");
                row.innerHTML = `<td colspan="4" style="text-align: center;">Немає результатів</td>`;
                resultsTable.appendChild(row);
                return;
            }

            results.forEach(item => {
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>${item.model}</td>
                    <td>${item.brand}</td>
                    <td>${item.type}</td>
                    <td>${item.power}</td>
                `;
                resultsTable.appendChild(row);
            });
        }

        // Ініціалізація
        window.onload = () => {
            populateFilters();
            renderResults(data);
        };
    </script>
</body>
</html>
